apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ml-serving
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ORG/secure-ml-cicd
    targetRevision: main
    path: deploy/ml-serving
  destination:
    server: https://kubernetes.default.svc
    namespace: ml-serving
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
