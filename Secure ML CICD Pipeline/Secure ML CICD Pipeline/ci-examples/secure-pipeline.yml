name: secure-pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      image: ghcr.io/${{ github.repository }}/app
    steps:
      - uses: actions/checkout@v4

      - name: verify GitHub-verified commits
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "pull_request" ]; then
            mapfile -t commits < <(
              gh api --paginate \
                "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/commits" \
                --jq '.[].sha'
            )
          elif [ -n "${BEFORE_SHA:-}" ] && [[ ! "$BEFORE_SHA" =~ ^0+$ ]]; then
            mapfile -t commits < <(
              gh api \
                "repos/${GITHUB_REPOSITORY}/compare/${BEFORE_SHA}...${GITHUB_SHA}" \
                --jq '.commits[].sha'
            )
          else
            commits=("$GITHUB_SHA")
          fi

          if [ "${#commits[@]}" -eq 0 ]; then
            echo "No commits found to verify."
            exit 1
          fi

          for sha in "${commits[@]}"; do
            verified="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${sha}" --jq '.commit.verification.verified')"
            reason="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${sha}" --jq '.commit.verification.reason')"
            if [ "$verified" != "true" ]; then
              echo "Commit ${sha} is not GitHub-verified: ${reason}"
              exit 1
            fi
            echo "Verified commit ${sha}"
          done

      # SAST
      - name: detect CodeQL-supported source
        id: codeql-detect
        shell: bash
        run: |
          set -euo pipefail
          if find . -path ./.git -prune -o -type f \( \
              -name '*.c' -o -name '*.cc' -o -name '*.cpp' -o -name '*.cxx' -o \
              -name '*.h' -o -name '*.hpp' -o -name '*.cs' -o -name '*.go' -o \
              -name '*.java' -o -name '*.kt' -o -name '*.kts' -o -name '*.js' -o \
              -name '*.jsx' -o -name '*.ts' -o -name '*.tsx' -o -name '*.py' -o \
              -name '*.rb' -o -name '*.swift' \
            \) -print -quit | grep -q .; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "No CodeQL-supported source files found; skipping CodeQL."
          fi

      - uses: github/codeql-action/init@v3
        if: steps.codeql-detect.outputs.enabled == 'true'
      - uses: github/codeql-action/analyze@v3
        if: steps.codeql-detect.outputs.enabled == 'true'

      # Dependency / secret scan
      - uses: trufflesecurity/trufflehog@main
        with: { extra_args: --only-verified }

      # Build + push
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/app:${{ github.sha }}

      # SBOM (cyclonedx)
      - uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}/app:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom.cdx.json

      # Vuln scan: Trivy (fail on HIGH/CRITICAL)
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/app:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      # Vuln scan: Grype (fail on HIGH/CRITICAL)
      - uses: anchore/scan-action@v3
        with:
          image: ghcr.io/${{ github.repository }}/app:${{ github.sha }}
          fail-build: true
          severity-cutoff: high

      - uses: sigstore/cosign-installer@v3
      - name: sign image, SBOM, and audit record
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.build.outputs.digest }}
          IMG: ghcr.io/${{ github.repository }}/app
          CODEQL_ENABLED: ${{ steps.codeql-detect.outputs.enabled }}
        run: |
          set -euo pipefail
          IMAGE="${IMG}@${DIGEST}"
          CODEQL_ACTION="codeql"
          if [ "$CODEQL_ENABLED" != "true" ]; then
            CODEQL_ACTION="codeql-skipped-no-supported-source"
          fi
          cosign sign --yes "$IMAGE"
          cosign attest --yes --type cyclonedx --predicate sbom.cdx.json "$IMAGE"
          cat > audit.cicd.json <<EOF
          {
            "repository": "${GITHUB_REPOSITORY}",
            "commit": "${GITHUB_SHA}",
            "workflow": "${GITHUB_WORKFLOW}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_attempt": "${GITHUB_RUN_ATTEMPT}",
            "image": "$IMAGE",
            "actions": [
              "signed-commit-verified",
              "$CODEQL_ACTION",
              "secret-scan",
              "image-build",
              "trivy-high-critical-scan",
              "grype-high-critical-scan",
              "cosign-image-signature",
              "cyclonedx-sbom-attestation"
            ]
          }
          EOF
          cosign attest --yes --type secureml.cicd.audit/v1 --predicate audit.cicd.json "$IMAGE"

      - uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/${{ github.repository }}/app
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
