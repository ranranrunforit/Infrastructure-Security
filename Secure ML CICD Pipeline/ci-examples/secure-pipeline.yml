name: secure-pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      image: ghcr.io/${{ github.repository }}/app
    steps:
      - uses: actions/checkout@v4

      - name: verify signed commits
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=100 origin "${{ github.base_ref }}"
            git rev-list "origin/${{ github.base_ref }}..HEAD" | xargs -r -n1 git verify-commit
          else
            git verify-commit HEAD
          fi

      # SAST
      - uses: github/codeql-action/init@v3
      - uses: github/codeql-action/analyze@v3

      # Dependency / secret scan
      - uses: trufflesecurity/trufflehog@main
        with: { extra_args: --only-verified }

      # Build + push
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/app:${{ github.sha }}

      # SBOM (cyclonedx)
      - uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}/app:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom.cdx.json

      # Vuln scan: Trivy (fail on HIGH/CRITICAL)
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/app:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      # Vuln scan: Grype (fail on HIGH/CRITICAL)
      - uses: anchore/scan-action@v3
        with:
          image: ghcr.io/${{ github.repository }}/app:${{ github.sha }}
          fail-build: true
          severity-cutoff: high

      - uses: sigstore/cosign-installer@v3
      - name: sign image, SBOM, and audit record
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.build.outputs.digest }}
          IMG: ghcr.io/${{ github.repository }}/app
        run: |
          set -euo pipefail
          IMAGE="${IMG}@${DIGEST}"
          cosign sign --yes "$IMAGE"
          cosign attest --yes --type cyclonedx --predicate sbom.cdx.json "$IMAGE"
          cat > audit.cicd.json <<EOF
          {
            "repository": "${GITHUB_REPOSITORY}",
            "commit": "${GITHUB_SHA}",
            "workflow": "${GITHUB_WORKFLOW}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_attempt": "${GITHUB_RUN_ATTEMPT}",
            "image": "$IMAGE",
            "actions": [
              "signed-commit-verified",
              "codeql",
              "secret-scan",
              "image-build",
              "trivy-high-critical-scan",
              "grype-high-critical-scan",
              "cosign-image-signature",
              "cyclonedx-sbom-attestation"
            ]
          }
          EOF
          cosign attest --yes --type secureml.cicd.audit/v1 --predicate audit.cicd.json "$IMAGE"

      - uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/${{ github.repository }}/app
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
