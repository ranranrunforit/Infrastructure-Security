# FR-003: Vault-backed secret flow: Vault -> External Secrets Operator ->
# Kubernetes Secret. No secret values are stored in this manifest.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-ml-platform
spec:
  provider:
    vault:
      server: "https://vault.vault.svc:8200"
      path: "kv"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso-ml-platform"
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: iris-api-secrets
  namespace: iris
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-ml-platform
    kind: ClusterSecretStore
  target:
    name: iris-api-secrets
    creationPolicy: Owner
  data:
    - secretKey: model_registry_token
      remoteRef:
        key: iris/api
        property: model_registry_token
