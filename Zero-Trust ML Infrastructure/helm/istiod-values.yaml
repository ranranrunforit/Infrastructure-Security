# Istiod: control plane. Trust domain matches SPIRE so SVIDs are
# accepted as workload principals (spire/server.yaml).
global:
  meshID: ml-platform
  trustDomain: ml-platform.local
meshConfig:
  enableAutoMtls: true
  defaultConfig:
    holdApplicationUntilProxyStarts: true
pilot:
  env:
    PILOT_ENABLE_WORKLOAD_ENTRY_AUTOREGISTRATION: "true"
