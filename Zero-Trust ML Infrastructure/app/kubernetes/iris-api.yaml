apiVersion: v1
kind: Namespace
metadata:
  name: iris
  labels:
    istio-injection: enabled
    owner: ml-platform
    tier: ml
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: iris-api
  namespace: iris
  labels:
    owner: ml-platform
    tier: ml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iris-api
  namespace: iris
  labels:
    app: iris-api
    owner: ml-platform
    tier: ml
spec:
  replicas: 2
  selector:
    matchLabels:
      app: iris-api
  template:
    metadata:
      labels:
        app: iris-api
        owner: ml-platform
        tier: ml
    spec:
      serviceAccountName: iris-api
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: iris-api
          image: ghcr.io/example/ml-platform/iris-api@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: MODEL_VERSION
              value: local-linear-v1
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: MODEL_REGISTRY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: iris-api-secrets
                  key: model_registry_token
                  optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: iris-api
  namespace: iris
  labels:
    app: iris-api
    owner: ml-platform
    tier: ml
spec:
  selector:
    app: iris-api
  ports:
    - name: http
      port: 8080
      targetPort: http
