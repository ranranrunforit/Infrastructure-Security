# Default-deny + explicit-allow at the mesh layer.
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata: { name: default-deny, namespace: iris }
spec: {}    # empty = deny all
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata: { name: allow-from-ingress, namespace: iris }
spec:
  selector: { matchLabels: { app: iris-api } }
  rules:
    - from:
        - source: { principals: ["ml-platform.local/ns/istio-system/sa/istio-ingressgateway-service-account"] }
      to:
        - operation: { methods: [GET, POST], paths: ["/predict", "/health"] }
