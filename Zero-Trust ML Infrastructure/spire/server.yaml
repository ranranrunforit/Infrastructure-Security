# SPIRE server: issues SVIDs per workload, 24h cert TTL (FR-002).
apiVersion: v1
kind: Namespace
metadata: { name: spire }
---
apiVersion: v1
kind: ConfigMap
metadata: { name: spire-server, namespace: spire }
data:
  server.conf: |
    server {
      bind_address = "0.0.0.0"
      bind_port    = "8081"
      trust_domain = "ml-platform.local"
      data_dir     = "/run/spire/data"
      log_level    = "INFO"
      ca_ttl       = "168h"
      default_x509_svid_ttl = "24h"
      default_jwt_svid_ttl  = "1h"
    }
    plugins {
      DataStore "sql" {
        plugin_data { database_type = "sqlite3" connection_string = "/run/spire/data/datastore.sqlite3" }
      }
      KeyManager "disk" { plugin_data { keys_path = "/run/spire/data/keys.json" } }
      NodeAttestor "k8s_psat" {
        plugin_data { clusters = { "ml-platform" = { service_account_allow_list = ["spire:spire-agent"] } } }
      }
    }
---
apiVersion: apps/v1
kind: StatefulSet
metadata: { name: spire-server, namespace: spire }
spec:
  serviceName: spire-server
  replicas: 1
  selector: { matchLabels: { app: spire-server } }
  template:
    metadata: { labels: { app: spire-server } }
    spec:
      serviceAccountName: spire-server
      containers:
        - name: spire-server
          image: ghcr.io/spiffe/spire-server:1.9.0
          args: ["-config", "/run/spire/config/server.conf"]
          ports: [{ containerPort: 8081 }]
          volumeMounts:
            - { name: config, mountPath: /run/spire/config, readOnly: true }
            - { name: data,   mountPath: /run/spire/data }
      volumes:
        - { name: config, configMap: { name: spire-server } }
        - { name: data,   emptyDir: {} }
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: spire-server, namespace: spire }
---
apiVersion: v1
kind: Service
metadata: { name: spire-server, namespace: spire }
spec:
  selector: { app: spire-server }
  ports: [{ name: grpc, port: 8081, targetPort: 8081 }]
